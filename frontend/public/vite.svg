<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" ry="13.5"
        fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="64" height="4" rx="14" ry="14" fill="url(#orange)" clip-path="url(#rounded)"/>
  <rect x="0" y="2" width="64" height="2" fill="url(#orange)"/>

  <!-- Letter F — vertical bar -->
  <rect x="14" y="16" width="9" height="34" rx="2" ry="2"
        fill="url(#orange)" filter="url(#glow)"/>

  <!-- Letter F — top horizontal bar -->
  <rect x="14" y="16" width="28" height="8" rx="2" ry="2"
        fill="url(#orange)" filter="url(#glow)"/>

  <!-- Letter F — middle horizontal bar -->
  <rect x="14" y="30" width="21" height="7" rx="2" ry="2"
        fill="url(#orange)" filter="url(#glow)"/>

  <!-- Dot accent bottom-right -->
  <circle cx="50" cy="50" r="6" fill="url(#orange)" filter="url(#glow)"/>
  <!-- Dot highlight -->
  <circle cx="48" cy="48" r="2" fill="#fff" opacity="0.15"/>
</svg>